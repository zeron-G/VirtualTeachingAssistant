name: build-and-deploy

# CI/CD for the Discord worker.
#
# WHY THIS SHAPE: on some Azure tenants the account cannot create a service
# principal OR assign roles, and the subscription may block ACR Tasks
# (server-side `az acr build`). So:
#   - BUILD happens here on GitHub's runners (no local Docker dependency), pushing
#     to the registry with its admin credentials (data-plane only, no Azure AD).
#   - DEPLOY (rolling the Container App to the new image) needs an Azure
#     management identity (a federated user-assigned managed identity via OIDC).
#     Until that identity is granted a role by a subscription Owner, the deploy
#     job is SKIPPED (guarded by the AUTO_DEPLOY repo variable) and rollout is a
#     one-line local command (scripts/deploy.ps1) under your own az login.
#
# All environment-specific values come from repo VARIABLES/SECRETS, never the
# source. Required repo variables: ACR_LOGIN_SERVER, IMAGE_NAME,
# AZURE_RESOURCE_GROUP, CONTAINER_APP_NAME (+ AZURE_CLIENT_ID / AZURE_TENANT_ID /
# AZURE_SUBSCRIPTION_ID for the deploy job). Required secrets: ACR_USERNAME,
# ACR_PASSWORD. To enable auto-deploy once the identity has a role:
#   gh variable set AUTO_DEPLOY --body true

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'turbo.json'
      - 'tsconfig*.json'
      - '.dockerignore'
      - '.github/workflows/build-and-deploy.yml'
  workflow_dispatch: {}

concurrency:
  group: build-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ${{ vars.ACR_LOGIN_SERVER }}
  IMAGE: ${{ vars.IMAGE_NAME }}
  RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  CONTAINER_APP: ${{ vars.CONTAINER_APP_NAME }}

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/discord-worker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          {
            echo "### :rocket: Image pushed to ACR"
            echo ""
            echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.sha }}\`"
            echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE }}:latest\`"
            echo ""
            echo "Roll it out (no Docker needed): \`pwsh scripts/deploy.ps1\`"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    # SKIPPED until a subscription Owner grants the managed identity a role and
    # AUTO_DEPLOY is flipped to "true". See the file header.
    if: ${{ vars.AUTO_DEPLOY == 'true' }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Azure login (OIDC, user-assigned managed identity)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Roll Container App to the new image
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              -n "${{ env.CONTAINER_APP }}" \
              -g "${{ env.RESOURCE_GROUP }}" \
              --image "${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.sha }}"
