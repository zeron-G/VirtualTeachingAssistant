name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, typecheck, build, test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test
        # NOTE: DB-dependent tests are intentionally excluded from CI for now.
        # When data-layer tests are introduced, add a Postgres service container
        # to this job, e.g.:
        #
        #   services:
        #     postgres:
        #       image: postgres:16
        #       env:
        #         POSTGRES_USER: vta
        #         POSTGRES_PASSWORD: vta
        #         POSTGRES_DB: vta_test
        #       ports:
        #         - 5432:5432
        #       options: >-
        #         --health-cmd "pg_isready -U vta"
        #         --health-interval 10s
        #         --health-timeout 5s
        #         --health-retries 5
        #
        # and wire DATABASE_URL into the test step's env.
