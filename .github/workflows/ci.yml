name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - name: Install package and build tools
        run: python -m pip install . build
      - name: Unit tests
        run: python -m unittest discover -s tests -v
      - name: Compile
        run: python -m compileall -q virtual_teaching_assistant course_ta_deployer tests scripts
      - name: Architecture boundaries
        run: python scripts/check_architecture.py
      - name: Documentation links
        run: python scripts/check_docs.py
      - name: Evaluation fixture contract
        run: python scripts/validate_evals.py
      - name: Release security scan
        run: python scripts/security_scan.py .
      - name: Build distribution
        run: python -m build
